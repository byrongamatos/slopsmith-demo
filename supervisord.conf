[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:goatcounter]
command=goatcounter serve -listen 127.0.0.1:8081 -db sqlite3+/config/goatcounter.db
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:slopsmith]
command=uvicorn server:app --host 0.0.0.0 --port 8000
directory=/app
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:nginx]
command=nginx -g 'daemon off;'
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
